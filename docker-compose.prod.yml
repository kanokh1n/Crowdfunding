services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crowdfunding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  back:
    build: ./back
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/crowdfunding?sslmode=disable
      REDIS_URL: redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  front:
    build: ./front
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - back

volumes:
  postgres_data:
  redis_data:
