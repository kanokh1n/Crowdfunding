  # ═══════════════════════════════════════════════════
  # MODERATION
  # ═══════════════════════════════════════════════════

  /api/admin/moderation:
    get:
      tags: [Moderation]
      summary: List projects awaiting human review
      description: Returns projects with status=pending_human, oldest first.
      security:
        - BearerAuth: []
      parameters:
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 10 } }
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedMeta'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'

  /api/admin/moderation/{project_id}:
    get:
      tags: [Moderation]
      summary: Get project moderation details
      security:
        - BearerAuth: []
      parameters:
        - { in: path, name: project_id, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Project with full moderation info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Not found

    patch:
      tags: [Moderation]
      summary: Approve or reject project
      security:
        - BearerAuth: []
      parameters:
        - { in: path, name: project_id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject]
                  example: approve
                moderator_note:
                  type: string
                  description: Required when rejecting; shown to project author
                  example: Проект содержит признаки рекламы запрещённых товаров
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Project is not in pending_human status

  /api/admin/moderation/{project_id}/recheck:
    post:
      tags: [Moderation]
      summary: Re-run AI check on a project
      description: Resets moderation state and re-runs AI. Useful after author edits the project.
      security:
        - BearerAuth: []
      parameters:
        - { in: path, name: project_id, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Project with fresh moderation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /api/admin/categories/{id}:
    delete:
      tags: [Admin]
      summary: Delete a category
      security:
        - BearerAuth: []
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
